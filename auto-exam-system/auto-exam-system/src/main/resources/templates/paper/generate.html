<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>自动组卷 - 自动组卷系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📝 自动组卷系统</div>
        <div class="navbar-menu">
            <a th:href="@{/dashboard}" class="nav-link">控制台</a>
            <a th:href="@{/question/list}" class="nav-link">题库管理</a>
            <a th:href="@{/paper/list}" class="nav-link">试卷管理</a>
            <a th:href="@{/paper/generate}" class="nav-link active">自动组卷</a>
        </div>
        <div class="navbar-user">
            <span>欢迎, <strong sec:authentication="name">xyf</strong></span>
            <a th:href="@{/logout}" class="btn btn-sm">退出</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title">🧬 自动组卷</h2>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

        <!-- 题库为空时的提示 -->
        <div class="alert alert-error" th:if="${subjects == null || subjects.isEmpty()}">
            ⚠️ 题库为空！请先到 <a th:href="@{/question/list}">题库管理</a> 页面点击「导入示例题」按钮，然后再来组卷。
            <br>
            <form th:action="@{/question/import-sample}" method="post" style="margin-top:10px; display:inline">
                <button type="submit" class="btn btn-primary">📥 一键导入示例题目</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">⚙️ 组卷参数设置</div>
            <div class="card-body">
                <form th:action="@{/paper/generate}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label>试卷名称 <span class="required">*</span></label>
                            <input type="text" name="paperName" placeholder="如：2024年高等数学期末考试" required>
                        </div>
                        <div class="form-group">
                            <label>科目 <span class="required">*</span></label>
                            <select name="subject" required>
                                <option value="">请选择科目</option>
                                <option th:each="s : ${subjects}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>考试时长（分钟）</label>
                            <input type="number" name="duration" value="120" min="30" max="300">
                        </div>
                        <div class="form-group">
                            <label>目标总分</label>
                            <input type="number" name="totalScore" value="100" min="10" max="200">
                        </div>
                    </div>

                    <h3 class="section-title">📊 题型数量配置</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>单选题数</label>
                            <input type="number" name="singleChoice" value="10" min="0" max="50">
                        </div>
                        <div class="form-group">
                            <label>多选题数</label>
                            <input type="number" name="multiChoice" value="5" min="0" max="50">
                        </div>
                        <div class="form-group">
                            <label>判断题数</label>
                            <input type="number" name="judge" value="5" min="0" max="50">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>填空题数</label>
                            <input type="number" name="fill" value="5" min="0" max="50">
                        </div>
                        <div class="form-group">
                            <label>简答题数</label>
                            <input type="number" name="shortAnswer" value="3" min="0" max="20">
                        </div>
                    </div>

                    <h3 class="section-title">📈 难度比例配置</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>简单 (%)</label>
                            <input type="number" name="easyRatio" value="30" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label>中等 (%)</label>
                            <input type="number" name="mediumRatio" value="50" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label>困难 (%)</label>
                            <input type="number" name="hardRatio" value="20" min="0" max="100">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-lg"
                                th:disabled="${subjects == null || subjects.isEmpty()}">🧬 开始智能组卷</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
