<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动组卷系统 - 控制台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">📝 自动组卷系统</div>
        <div class="navbar-menu">
            <a th:href="@{/dashboard}" class="nav-link active">控制台</a>
            <a th:href="@{/question/list}" class="nav-link">题库管理</a>
            <a th:href="@{/paper/list}" class="nav-link">试卷管理</a>
            <a th:href="@{/paper/generate}" class="nav-link">自动组卷</a>
        </div>
        <div class="navbar-user">
            <span>欢迎, <strong sec:authentication="name">xyf</strong></span>
            <a th:href="@{/logout}" class="btn btn-sm">退出</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title">📊 控制台</h2>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card stat-blue">
                <div class="stat-number" th:text="${questionCount}">0</div>
                <div class="stat-label">题库题目总数</div>
            </div>
            <div class="stat-card stat-green">
                <div class="stat-number" th:text="${subjects.size()}">0</div>
                <div class="stat-label">科目数量</div>
            </div>
            <div class="stat-card stat-orange">
                <div class="stat-number">5</div>
                <div class="stat-label">支持题型</div>
            </div>
            <div class="stat-card stat-purple">
                <div class="stat-number">GA</div>
                <div class="stat-label">遗传算法组卷</div>
            </div>
        </div>

        <!-- 快捷操作 -->
        <div class="card">
            <div class="card-header">🚀 快捷操作</div>
            <div class="card-body">
                <div class="quick-actions">
                    <a th:href="@{/question/add}" class="action-btn">
                        <span class="action-icon">➕</span>
                        <span>添加题目</span>
                    </a>
                    <a th:href="@{/paper/generate}" class="action-btn">
                        <span class="action-icon">🧬</span>
                        <span>自动组卷</span>
                    </a>
                    <a th:href="@{/question/list}" class="action-btn">
                        <span class="action-icon">📚</span>
                        <span>浏览题库</span>
                    </a>
                    <a th:href="@{/paper/list}" class="action-btn">
                        <span class="action-icon">📋</span>
                        <span>试卷列表</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- 系统信息 -->
        <div class="card">
            <div class="card-header">ℹ️ 系统信息</div>
            <div class="card-body">
                <table class="info-table">
                    <tr>
                        <td>技术栈</td>
                        <td>Spring Boot 2.7 + Spring Security + JPA + Thymeleaf + H2</td>
                    </tr>
                    <tr>
                        <td>组卷算法</td>
                        <td>遗传算法 (Genetic Algorithm)，支持种群选择、交叉、变异优化</td>
                    </tr>
                    <tr>
                        <td>支持题型</td>
                        <td>单选题、多选题、判断题、填空题、简答题</td>
                    </tr>
                    <tr>
                        <td>已录入科目</td>
                        <td>
                            <span th:each="s : ${subjects}" class="tag" th:text="${s}"></span>
                            <span th:if="${subjects.isEmpty()}" class="text-muted">暂无科目，请先导入题目</span>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
