<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>题目编辑 - 自动组卷系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📝 自动组卷系统</div>
        <div class="navbar-menu">
            <a th:href="@{/dashboard}" class="nav-link">控制台</a>
            <a th:href="@{/question/list}" class="nav-link active">题库管理</a>
            <a th:href="@{/paper/list}" class="nav-link">试卷管理</a>
            <a th:href="@{/paper/generate}" class="nav-link">自动组卷</a>
        </div>
        <div class="navbar-user">
            <span>欢迎, <strong sec:authentication="name">xyf</strong></span>
            <a th:href="@{/logout}" class="btn btn-sm">退出</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title" th:text="${question.id != null ? '✏️ 编辑题目' : '➕ 添加题目'}">添加题目</h2>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/question/save}" method="post" th:object="${question}">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-row">
                        <div class="form-group">
                            <label>科目 <span class="required">*</span></label>
                            <input type="text" th:field="*{subject}" placeholder="如：高等数学" required list="subjectList">
                            <datalist id="subjectList">
                                <option th:each="s : ${subjects}" th:value="${s}"></option>
                            </datalist>
                        </div>
                        <div class="form-group">
                            <label>章节/知识点</label>
                            <input type="text" th:field="*{chapter}" placeholder="如：极限与连续">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>题型 <span class="required">*</span></label>
                            <select th:field="*{type}" required>
                                <option value="">请选择题型</option>
                                <option value="1">单选题</option>
                                <option value="2">多选题</option>
                                <option value="3">判断题</option>
                                <option value="4">填空题</option>
                                <option value="5">简答题</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>难度 <span class="required">*</span></label>
                            <select th:field="*{difficulty}" required>
                                <option value="">请选择难度</option>
                                <option value="1">简单</option>
                                <option value="2">中等</option>
                                <option value="3">困难</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>分值 <span class="required">*</span></label>
                            <input type="number" th:field="*{score}" min="1" max="100" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>题目内容 <span class="required">*</span></label>
                        <textarea th:field="*{content}" rows="4" placeholder="请输入题目内容" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>选项（JSON格式，选择题必填）</label>
                        <textarea th:field="*{options}" rows="4" placeholder='如：["A. 选项一", "B. 选项二", "C. 选项三", "D. 选项四"]'></textarea>
                        <small class="text-muted">格式：["A. xxx", "B. xxx", ...]，判断题和填空题可留空</small>
                    </div>

                    <div class="form-group">
                        <label>正确答案 <span class="required">*</span></label>
                        <input type="text" th:field="*{answer}" placeholder="如：B 或 A,B,C 或 正确" required>
                        <small class="text-muted">单选填选项字母，多选用逗号分隔，判断填"正确/错误"，填空和简答填文字</small>
                    </div>

                    <div class="form-group">
                        <label>解析</label>
                        <textarea th:field="*{analysis}" rows="3" placeholder="答案解析（选填）"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">💾 保存</button>
                        <a th:href="@{/question/list}" class="btn">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
